<!-- game-contact.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="photos/favicon.svg" type="image/svg+xml">
  <title>Contact Game News</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #1e293b;
    }
    nav {
      background: #1e293b;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #e2e8f0;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #38bdf8;
    }
    .container {
      width: 85%;
      margin: 20px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    form input, form textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    form button {
      background: #38bdf8;
      color: #020617;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    form button:hover {
      background: #0ea5e9;
    }
    footer {
      background: #020617;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
      border-top: 2px solid #1e293b;
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Game News</h1>
    <p>Get in touch with us</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="signup.html">Sign up</a>
    <a href="login.html">Login</a>
  </nav>

  <div class="container">
    <h2>Send Us a Message</h2>
    <p>Have news tips, questions, or feedback? Fill out the form below:</p>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>© 2026 Game News</p>
  </footer>

</body>
</html>
