<svg width="48" height="48" viewBox="0 0 160 160"
  xmlns="http://www.w3.org/2000/svg">
  <!-- dark circle bg -->
  <circle cx="80" cy="80" r="72" fill="#1a1a2e"/>
  <!-- PS ring -->
  <circle cx="80" cy="80" r="28" fill="none"
    stroke="#00439C" stroke-width="5"/>
  <!-- Xbox cross -->
  <line x1="80" y1="20" x2="80" y2="140"
    stroke="#107C10" stroke-width="5"/>
  <line x1="20" y1="80" x2="140" y2="80"
    stroke="#107C10" stroke-width="5"/>
  <!-- PS symbols -->
  <text x="80" y="38" fill="#F5F5F5">▲</text>
  <text x="80" y="122" fill="#E4002B">✕</text>
  <text x="38" y="80" fill="#00439C">■</text>
  <text x="122" y="80" fill="#00B04F">●</text>
</svg>