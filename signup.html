<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="photos/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game News Sign Up</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background-color: #0f172a; color: #e2e8f0; }
    header { background: #020617; padding: 20px; text-align: center; border-bottom: 2px solid #1e293b; }
    header h1 { margin: 0; color: #38bdf8; }
    nav { background: #1e293b; padding: 10px; text-align: center; }
    nav a { color: #e2e8f0; margin: 0 15px; text-decoration: none; font-weight: bold; }
    nav a:hover { color: #38bdf8; }

    .container { width: 90%; max-width: 500px; margin: 40px auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
    .container h2 { text-align: center; color: #38bdf8; }

    .row { display: flex; gap: 10px; }
    .row input { width: 100%; }

    form input, form select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }

    form button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      color: #020617;
    }

    form button:hover { background: #0ea5e9; }

    .error { color: #f87171; font-size: 13px; display: none; }
    .small-text { text-align: center; font-size: 13px; margin-top: 10px; color: #94a3b8; }

    footer { background: #020617; text-align: center; padding: 10px; margin-top: 40px; border-top: 2px solid #1e293b; }
  </style>
</head>
<body>

<header>
  <h1>🎮 Game News</h1>
  <p>Create your account</p>
</header>

<nav>
  <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="signup.html">Sign up</a>
      <a href="login.html">Login</a>          
</nav>

<div class="container">
  <h2>Sign Up</h2>
  <form onsubmit="return validateAge()">

    <div class="row">
      <input type="text" placeholder="First Name" required>
      <input type="text" placeholder="Last Name" required>
    </div>

    <input type="text" placeholder="Username" required>
    <input type="email" placeholder="Email" required>

    <select required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <input type="date" id="birthdate" required>
    <div class="error" id="ageError">You must be at least 18 years old.</div>

    <input type="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <button type="submit">Create Account</button>
  </form>

  <div class="small-text">
    Join Game News and get the latest gaming updates!
  </div>
</div>

<footer>
  <p>© 2026 Game News</p>
</footer>

<script>
  const today = new Date();
  const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
  document.getElementById("birthdate").max = maxDate.toISOString().split("T")[0];

  function validateAge() {
    const birthdate = new Date(document.getElementById("birthdate").value);
    const error = document.getElementById("ageError");

    if (birthdate > maxDate) {
      error.style.display = "block";
      return false;
    }

    error.style.display = "none";
    return true;
  }
</script>

</body>
</html>
